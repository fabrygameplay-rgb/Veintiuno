<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(to bottom right, #dff6ff, #ffffff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #recoverContainer {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #recoverContainer h1 {
            text-align: center;
            color: #0084ff;
        }

        #recoverContainer p {
            text-align: center;
            color: #555;
        }

        #recoverContainer input {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
        }

        #recoverContainer button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #0084ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        #recoverContainer button:hover {
            transform: scale(1.03);
        }

        #backButton {
            text-align: center;
            text-decoration: none;
            color: #0084ff;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div id="recoverContainer">

        <h1>🔐 Recover Password</h1>

        <p>
            Enter your email address and we will send you
            instructions to recover your account.
        </p>

        <input 
            type="email" 
            placeholder="Enter your email"
        >

        <button id="recoverButton">
            Send Recovery Link
        </button>

        <a id="backButton" href="user.html?view=logIn">
            ← Back to Log In
        </a>

    </div>

</body>
</html>
